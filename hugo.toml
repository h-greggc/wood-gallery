baseURL = '/'

title = 'My Wood Gallery'
# theme = 'lightbi-hugo'

languageCode = "en"

summaryLength  = "50"
metaDataFormat = "yaml"
pygmentsStyle = "trac"
pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsCodefencesGuessSyntax = true
pygmentsUseClassic = true
pygmentOptions = "linenos=inline"
#googleAnalytics = "XXX"
enableRobotsTXT = true
enableGitInfo = false
ignoreLogs = ['warning-goldmark-raw-html']


[Params]
selfHosted = true
mainSections = ["posts"]
dateFormat = "02 January 2006"
comments = false
readingTime = false
wordCount = false
hideAuthor = false
useHLJS = true
socialShare = false
delayDisqus = true
showRelatedPosts = true 
gcse = false
Lastmod = false
rss = true 
pagination = "10"
description="Your can add your website description here."
lunrSearch = true
previewCardImagePlacement = "bottom"
hidePostImage = false
tagSubtitle = "Here, you’ll discover the latest notes that explore new insights, and unique perspectives on the world."
homepageLayout = "profile" #blog
profileWelcomeHeading = "Hi I'm Gregg"
profileWelcomeSubHeading = "Welcome to my digital garden!"
profileShortbio = "I love creating in wood and I have enjoyed various forms of woodworking from my entire adult life. Here, you'll find a mix of photos, essays, quick notes, and personal reflections on what I’ve learned throughout my journey."
profilePhoto = "img/profile/home-profile-pic.jpg"

[pagination]
pagerSize = 9


